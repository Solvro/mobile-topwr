name: widgetbook_workspace
description: "Widgetbook workspace for ToPWR mobile app"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.1
resolution: workspace

dependencies:
  topwr: any
  topwr_assets: any
  flutter:
    sdk: flutter
  widgetbook: ^4.0.0-beta.1
  auto_route: ^11.1.0
  fast_immutable_collections: ^11.1.0
  riverpod: ^3.1.0
  flutter_riverpod: ^3.1.0
  hooks_riverpod: ^3.1.0
  intl: ^0.20.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.0
  solvro_config: ^1.3.0

flutter:
  uses-material-design: true

  fonts:
    - family: BottomNavBarIcons
      fonts:
        - asset: packages/topwr_assets/fonts/BottomNavBarIcons.ttf
    - family: IParkingIcons
      fonts:
        - asset: packages/topwr_assets/fonts/IParkingIcons.ttf
    - family: StrategicClubBadges
      fonts:
        - asset: packages/topwr_assets/fonts/StrategicClubBadges.ttf
    - family: Rubik
      fonts:
        - asset: packages/topwr_assets/fonts/rubik/Rubik-Light.ttf
          weight: 300
        - asset: packages/topwr_assets/fonts/rubik/Rubik-LightItalic.ttf
          weight: 300
          style: italic
        - asset: packages/topwr_assets/fonts/rubik/Rubik-Regular.ttf
          weight: 400
        - asset: packages/topwr_assets/fonts/rubik/Rubik-Italic.ttf
          weight: 400
          style: italic
        - asset: packages/topwr_assets/fonts/rubik/Rubik-Medium.ttf
          weight: 500
        - asset: packages/topwr_assets/fonts/rubik/Rubik-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: packages/topwr_assets/fonts/rubik/Rubik-SemiBold.ttf
          weight: 600
        - asset: packages/topwr_assets/fonts/rubik/Rubik-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: packages/topwr_assets/fonts/rubik/Rubik-Bold.ttf
          weight: 700
        - asset: packages/topwr_assets/fonts/rubik/Rubik-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: packages/topwr_assets/fonts/rubik/Rubik-ExtraBold.ttf
          weight: 800
        - asset: packages/topwr_assets/fonts/rubik/Rubik-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: packages/topwr_assets/fonts/rubik/Rubik-Black.ttf
          weight: 900
        - asset: packages/topwr_assets/fonts/rubik/Rubik-BlackItalic.ttf
          weight: 900
          style: italic
