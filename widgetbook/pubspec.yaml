name: widgetbook_workspace
description: "Widgetbook workspace for ToPWR mobile app"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  topwr:
    path: ../
  flutter:
    sdk: flutter
  widgetbook: ^4.0.0-beta.1
  fast_immutable_collections: ^11.1.0
  riverpod: ^3.1.0
  flutter_riverpod: ^3.1.0
  hooks_riverpod: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.0
  solvro_config: ^1.3.0

flutter:
  uses-material-design: true
