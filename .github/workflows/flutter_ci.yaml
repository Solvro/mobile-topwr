name: Integration Tests

on:
  pull_request:
    branches: 
      - main
      - dev
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  android-integration-test:
    name: Android Integration Tests
    runs-on: macos-latest 

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          cache: true 
      - name: Install dependencies
        run: flutter pub get

      - name: Install git-crypt (macOS)
        run: brew install git-crypt

      - name: git crypt unlock (Manual)
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          echo "$GIT_CRYPT_KEY" | base64 --decode > secret_key.key
          git-crypt unlock secret_key.key
          rm secret_key.key

      - name: Remove lib/l10n directory
        run: rm -rf lib/l10n/*.dart

      - name: Regenerate the localization files
        run: flutter gen-l10n

      - name: generate files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Boot iOS Simulator
        run: |
          # Wyłączamy przerywanie skryptu przy ostrzeżeniach
          set +e 
          
          # Szukamy pierwszego dostępnego iPhone'a i wyciągamy jego UUID z OKRĄGŁYCH nawiasów
          DEVICE_UUID=$(xcrun simctl list devices available | grep "iPhone" | head -n 1 | awk -F'[()]' '{print $2}')
          
          # Włączamy z powrotem standardowe rzucanie błędami
          set -e
          
          if [ -z "$DEVICE_UUID" ]; then
            echo "Błąd: Nie udało się wyciąć UUID! Oto co wyrzucił system:"
            xcrun simctl list devices available
            exit 1
          fi
          
          echo "Znalazłem urządzenie! Jego unikalne ID to: $DEVICE_UUID"
          
          # Uruchamiamy symulator (dodajemy '|| true', żeby nie wyrzucił błędu, jeśli cudem był już włączony)
          xcrun simctl boot "$DEVICE_UUID" || true
          
          # Czekamy aż się załaduje
          xcrun simctl bootstatus "$DEVICE_UUID"
          
          # Przekazujemy ID do kolejnego kroku
          echo "SIMULATOR_ID=$DEVICE_UUID" >> $GITHUB_ENV

      - name: Run Integration Tests on iOS Simulator
        run: flutter test integration_test/smoke_test.dart -d "iPhone 15"
        timeout-minutes: 30
