name: Integration Tests

on:
  pull_request:
    branches: 
      - main
      - dev
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  android-integration-test:
    name: Android Integration Tests
    runs-on: macos-latest 

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml
          cache: true 
      - name: Install dependencies
        run: flutter pub get

      - name: Install git-crypt (macOS)
        run: brew install git-crypt

      - name: git crypt unlock (Manual)
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          echo "$GIT_CRYPT_KEY" | base64 --decode > secret_key.key
          git-crypt unlock secret_key.key
          rm secret_key.key

      - name: Remove lib/l10n directory
        run: rm -rf lib/l10n/*.dart

      - name: Regenerate the localization files
        run: flutter gen-l10n

      - name: generate files
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Boot iOS Simulator
        run: |
          # 1. Sprawdzamy listę dostępnych symulatorów (opcjonalne, przydatne w logach)
          xcrun simctl list devices | grep "iPhone 15"
          
          # 2. Włączamy symulator (wybierz model, który jest na maszynie, np. iPhone 15)
          xcrun simctl boot "iPhone 15"
          
          # 3. Czekamy, aż system w symulatorze w pełni wstanie
          xcrun simctl bootstatus "iPhone 15"

      - name: Run Integration Tests on iOS Simulator
        run: flutter test integration_test/smoke_test.dart -d "iPhone 15"
        timeout-minutes: 30
