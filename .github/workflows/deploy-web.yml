name: CD - web

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: web-coolify
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Install git-crypt
        run: |
          sudo apt-get update
          sudo apt-get install -y git-crypt

      - name: Unlock encrypted environment files
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: echo "$GIT_CRYPT_KEY" | base64 -d | git-crypt unlock -

      - name: Verify web environment file
        run: test -s .env

      - name: Resolve image tag
        id: image
        run: |
          IMAGE_NAME=$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=${REGISTRY}/${IMAGE_NAME}:web-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Resolve Flutter version
        id: flutter
        run: |
          FLUTTER_VERSION=$(grep '^  flutter:' pubspec.yaml | sed 's/.*flutter:[[:space:]]*//' | tr -d '"[:space:]')
          test -n "$FLUTTER_VERSION"
          echo "version=$FLUTTER_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tag }}
          build-args: |
            FLUTTER_VERSION=${{ steps.flutter.outputs.version }}

      - name: Trigger Coolify deployment
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
        run: |
          if [ -n "$COOLIFY_WEBHOOK_URL" ]; then
            curl --fail --show-error --silent --request POST "$COOLIFY_WEBHOOK_URL"
          fi
