name: CD - ios internal

on:
  workflow_call:
    inputs:
      latest_changelog:
        required: false
        type: string
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: macos-26
    environment: continuous delivery
    steps:
      - uses: actions/checkout@v7

      - name: git crypt unlock
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          brew install git-crypt
          echo "$GIT_CRYPT_KEY" | base64 -d | git-crypt unlock -

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version-file: pubspec.yaml

      - name: Setup Melos
        uses: bluefireteam/melos-action@v3

      - run: flutter --version

      - name: Generate files
        run: melos build_runner

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: ios

      - name: Install Fastlane (iOS)
        run: |
          cd ios
          bundle install

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Configure SSH for Match
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MATCH_GIT_PRIVATE_KEY }}" > ~/.ssh/match_key
          chmod 600 ~/.ssh/match_key
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

      - name: Decode App Store Connect API key
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_P8_B64 }}" | base64 -d > ios/AuthKey.p8

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | tr -d '\r\n ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release=com.solvro.ToPwr@${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Run Fastlane internal
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/match_key -o StrictHostKeyChecking=accept-new"
          CI: true
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_PATH: ${{ github.workspace }}/ios/AuthKey.p8
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          APP_VERSION: ${{ steps.version.outputs.version }}
          LATEST_CHANGELOG: ${{ inputs.latest_changelog }}
          SPLIT_DEBUG_INFO: ${{ github.workspace }}/build/app/outputs/symbols
        run: |
          cd ios
          bundle exec fastlane internal

      - name: Upload debug symbols to Bugsink
        env:
          BUGSINK_AUTH_TOKEN: ${{ secrets.BUGSINK_AUTH_TOKEN }}
          BUGSINK_URL: ${{ secrets.BUGSINK_URL }}
          BUGSINK_ORG: bugsinkhasnoorgs
          BUGSINK_PROJECT: ignoredfornow
        run: |
          ls -la build/app/outputs/symbols || true
          mkdir -p .dart_tool/sentry-cli
          curl -fsSL https://downloads.sentry-cdn.com/sentry-cli/2.52.0/sentry-cli-Darwin-universal -o .dart_tool/sentry-cli/sentry-cli
          chmod +x .dart_tool/sentry-cli/sentry-cli
          if [ -d build/app/outputs/symbols ]; then
            .dart_tool/sentry-cli/sentry-cli --log-level debug --url "$BUGSINK_URL" --auth-token "$BUGSINK_AUTH_TOKEN" debug-files upload --org "$BUGSINK_ORG" --project "$BUGSINK_PROJECT" build/app/outputs/symbols
          fi
          UPLOADED_IOS_DSYMS=0
          if [ -s build/app/outputs/ios_dsym_path.txt ]; then
            IOS_DSYM_PATH=$(cat build/app/outputs/ios_dsym_path.txt)
            if [ -n "$IOS_DSYM_PATH" ] && [ -e "$IOS_DSYM_PATH" ]; then
              .dart_tool/sentry-cli/sentry-cli --log-level debug --url "$BUGSINK_URL" --auth-token "$BUGSINK_AUTH_TOKEN" debug-files upload --org "$BUGSINK_ORG" --project "$BUGSINK_PROJECT" "$IOS_DSYM_PATH"
              UPLOADED_IOS_DSYMS=1
            fi
          fi
          if [ "$UPLOADED_IOS_DSYMS" -eq 0 ] && [ -s build/app/outputs/ios_archive_path.txt ]; then
            IOS_ARCHIVE_PATH=$(cat build/app/outputs/ios_archive_path.txt)
            if [ -n "$IOS_ARCHIVE_PATH" ] && [ -d "$IOS_ARCHIVE_PATH/dSYMs" ]; then
              .dart_tool/sentry-cli/sentry-cli --log-level debug --url "$BUGSINK_URL" --auth-token "$BUGSINK_AUTH_TOKEN" debug-files upload --org "$BUGSINK_ORG" --project "$BUGSINK_PROJECT" "$IOS_ARCHIVE_PATH/dSYMs"
            fi
          fi
